name: Deploy Astro to AWS S3
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  S3_BUCKET: sweatshop-deploy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Required for Astro 6.1.5
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::524296810291:role/GitHubActionsS3DeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy files to S3
        run: aws s3 sync ./dist s3://${{ env.S3_BUCKET }} --delete
            --exclude ".git/*" \
            --exclude ".github/*"
